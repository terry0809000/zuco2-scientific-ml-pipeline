name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validate configuration files
        run: |
          python - <<'PY'
          import yaml

          for path in ["configs/default.yaml", "environment.yml"]:
              with open(path, "r", encoding="utf-8") as handle:
                  yaml.safe_load(handle)
          PY
      - name: Syntax-check scripts
        run: |
          python -m py_compile src/zuco2_pipeline/*.py scripts/run_pipeline.py
      - name: Run tests
        run: |
          pytest -q
      - name: Exercise CLI
        run: |
          zuco2-pipeline --help
          zuco2-pipeline init-config "$RUNNER_TEMP/config.yaml"
          zuco2-pipeline discover --data-dir data
      - name: Check forbidden tracked artifacts
        run: |
          ! git ls-files | grep -E '(^|/)(data|outputs)/.*\.(mat|h5|hdf5|csv|tsv|parquet|pkl|joblib|pickle|png|jpg|jpeg|pdf|zip|tar|gz)$|\.mat$|\.h5$|\.hdf5$'
